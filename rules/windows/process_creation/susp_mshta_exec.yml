title: MSHTA Suspicious Execution
id: a7b8c9d0-e1f2-3456-abcd-789012345678
status: experimental
description: Detects MSHTA.exe execution with suspicious file types or from unusual locations, indicating potential malicious HTA payload
references:
    - https://attack.mitre.org/techniques/T1218/005/
    - https://lolbas-project.github.io/lolbas/Binaries/Mshta/
author: Rudraksh Dixit
date: 2026-06-21
tags:
    - attack.defense_evasion
    - attack.t1218.005
    - attack.execution
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\mshta.exe'
    filter_known:
        CommandLine|contains:
            - 'about:'
            - 'javascript:'
    condition: selection and not filter_known
falsepositives:
    - Legitimate HTA applications used internally
    - Microsoft update mechanisms
level: high
