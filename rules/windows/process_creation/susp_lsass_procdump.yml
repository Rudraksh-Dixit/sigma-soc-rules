title: LSASS Access via Procdump
id: f7b2a1c3-4d5e-6f7a-8b9c-0d1e2f3a4b5c
status: experimental
description: Detects procdump.exe attempting to dump LSASS process memory, a common credential dumping technique
references:
    - https://attack.mitre.org/techniques/T1003/001/
    - https://learn.microsoft.com/en-us/sysinternals/downloads/procdump
author: Rudraksh Dixit
date: 2026-06-21
tags:
    - attack.credential_access
    - attack.t1003.001
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\procdump.exe'
        CommandLine|contains|all:
            - '-ma'
            - 'lsass'
    condition: selection
falsepositives:
    - Legitimate troubleshooting by system administrators
    - Forensic acquisition of memory for analysis
level: critical
