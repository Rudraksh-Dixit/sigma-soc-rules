title: Suspicious Service Installation
id: d0e1f2a3-b4c5-6789-defa-012345678901
status: experimental
description: Detects creation of new Windows services, a common persistence and execution technique used by adversaries
references:
    - https://attack.mitre.org/techniques/T1543/003/
    - https://docs.microsoft.com/en-us/windows/win32/services/service-installation
author: Rudraksh Dixit
date: 2026-06-21
tags:
    - attack.persistence
    - attack.t1543.003
    - attack.privilege_escalation
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith:
            - '\sc.exe'
            - '\powershell.exe'
        CommandLine|contains|all:
            - 'create'
            - 'binPath'
    filter_known:
        CommandLine|contains:
            - 'Mozilla'
            - 'Google'
            - 'Adobe'
            - 'Microsoft'
    condition: selection and not filter_known
falsepositives:
    - Legitimate software installation creating services
    - IT administration creating maintenance services
    - Security tool installations
level: high
