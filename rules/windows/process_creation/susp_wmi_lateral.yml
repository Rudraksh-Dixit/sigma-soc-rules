title: WMI Lateral Movement
id: d4e5f6a7-b8c9-0123-defa-456789012345
status: experimental
description: Detects WMI process creation on remote systems, a common lateral movement technique using win32_process create
references:
    - https://attack.mitre.org/techniques/T1047/
    - https://docs.microsoft.com/en-us/windows/win32/wmisdk/wmi-architecture
author: Rudraksh Dixit
date: 2026-06-21
tags:
    - attack.execution
    - attack.t1047
    - attack.lateral_movement
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\wmic.exe'
        CommandLine|contains|all:
            - '/node:'
            - 'process'
            - 'call'
            - 'create'
    condition: selection
falsepositives:
    - Legitimate remote administration by IT teams
    - SCCM or other management tools using WMI
    - System health monitoring scripts
level: high
