title: Rundll32 Suspicious Invocation
id: b8c9d0e1-f2a3-4567-bcde-890123456789
status: experimental
description: Detects rundll32.exe executing with suspicious DLL paths or uncommon DLL entry points, often used for DLL sideloading and code execution
references:
    - https://attack.mitre.org/techniques/T1218/011/
    - https://lolbas-project.github.io/lolbas/Binaries/Rundll32/
author: Rudraksh Dixit
date: 2026-06-21
tags:
    - attack.defense_evasion
    - attack.t1218.011
    - attack.execution
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\rundll32.exe'
        CommandLine|contains:
            - 'javascript:'
            - 'http://'
            - 'https://'
            - '..\\'
            - 'AppData'
            - 'Temp'
    condition: selection
falsepositives:
    - Legitimate Windows functionality using rundll32
    - System utilities that invoke DLL functions
level: high
