title: Certutil Download
id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
status: experimental
description: Detects certutil.exe used to download files from remote URLs, a common LOLBin technique for payload staging
references:
    - https://attack.mitre.org/techniques/T1105/
    - https://lolbas-project.github.io/lolbas/Binaries/Certutil/
author: Rudraksh Dixit
date: 2026-06-21
tags:
    - attack.command_and_control
    - attack.t1105
    - attack.defense_evasion
    - attack.t1218
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\certutil.exe'
        CommandLine|contains|all:
            - '-urlcache'
            - '-split'
            - 'http'
    condition: selection
falsepositives:
    - Legitimate certificate operations using URL cache
    - System administrators downloading patches
level: high
