title: Registry Run Key Modification
id: c3d4e5f6-a7b8-9012-cdef-345678901234
status: experimental
description: Detects modifications to Registry Run keys, a common persistence mechanism used by malware to maintain foothold
references:
    - https://attack.mitre.org/techniques/T1547/001/
    - https://docs.microsoft.com/en-us/windows/win32/setupapi/run-and-runonce-registry-keys
author: Rudraksh Dixit
date: 2026-06-21
tags:
    - attack.persistence
    - attack.t1547.001
    - attack.privilege_escalation
logsource:
    category: registry_event
    product: windows
detection:
    selection:
        TargetObject|contains:
            - '\Software\Microsoft\Windows\CurrentVersion\Run'
            - '\Software\Microsoft\Windows\CurrentVersion\RunOnce'
            - '\Software\Wow6432Node\Microsoft\Windows\CurrentVersion\Run'
        EventType: SetValue
    filter_known:
        Image|endswith:
            - '\OneDriveSetup.exe'
            - '\GoogleUpdate.exe'
            - '\msoffice.exe'
        TargetObject|contains: 'OneDrive'
    condition: selection and not filter_known
falsepositives:
    - Legitimate software adding Run keys during installation
    - Windows updates modifying RunOnce keys
level: high
